<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" href="{{ url_for('static', filename='imagenes/cuatro-estrellas.png') }}"> <!--este el el icono que va en la parte de las pestaña -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deluxe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header>
        <a id="idlogo" href="{{ url_for('index') }}"><div class="logo">Hotel Paradise</div></a><!--Agregue esto para que se devolviera a la pagina de inicio-->
        <nav>
            <a class="menu" href="{{ url_for('habitaciones') }}">habitaciones</a>
            <a href="{{ url_for('reservas') }}">Mis reservas</a>
        </nav>
    </header>

    <div class="contenedor">

        <!-- IZQUIERDA -->
        <div class="izquierda">
            <img src="{{ url_for('static', filename='imagenes/deluxe.jpg') }}">

            <div class="info">
                <div class="titulo">
                    <h2>Habitación Deluxe</h2>
                    <span class="precio">$600.000</span>
                </div>

                <div class="caracteristicas">
                    <span>👥 2 personas</span>
                    <span>35 m²</span>
                </div>

                <p class="descripcion">
                    Espaciosa habitación con vista panorámica y 
                    mobiliario de alta calidad.
                </p>
            </div>
        </div>

        <!-- DERECHA -->
        <div class="reserva">
            <h3>Reservar habitación Deluxe</h3>

            <form action="{{ url_for('confirmar_reserva') }}" method="POST">
                <input type="hidden" name="habitacion" value="Habitación Deluxe">
                <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>
                <input type="email" id="email" name="email" placeholder="Email" required>
                <input type="tel" id="telefono" name="telefono" placeholder="Teléfono" required>

                <label>Fecha de entrada</label>
                <input type="date" id="entrada" name="entrada" required>

                <label>Fecha de salida</label>
                <input type="date" id="salida" name="salida" required>

                <input type="number" id="huespedes" name="huespedes" placeholder="Número de huéspedes" required>

                <button type="submit">Confirmar reserva</button>
            </form>
        </div>

    </div>

</body>

<script src="script.js"></script>

</html>
