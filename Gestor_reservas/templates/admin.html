<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Hotelero</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <main class="main">
        <h1>PANEL DE CONTROL HOTELERO</h1>

        <div class="cards">
            <div class="card">
                <h3>Habitaciones</h3>
                <p>Total 40</p>
                <label><input type="checkbox"> Disponibles</label>
                <label><input type="checkbox"> Ocupadas</label>
                <label><input type="checkbox"> Reservadas</label>
            </div>

            <div class="card">
                <h3>Inventario</h3>
                <label><input type="checkbox"> Toallas</label>
                <label><input type="checkbox"> Sábanas</label>
                <label><input type="checkbox"> Amenidades</label>
            </div>

            <div class="card">
                <h3>Finanzas</h3>
                //INGRESAR CSV
                <input type="file" id="csvInput" accept=".csv" style="font-size: 11px; margin-bottom: 10px; width: 100%;">
                <div class="grafico-container" style="position: relative; height: 250px; width: 100%;">
                    <canvas id="graficoFinanzas"></canvas>
                </div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Habs</th>
                    <th>Estado</th>
                    <th>Huésped</th>
                </tr>
            </thead>
            <tbody>
                {% if reservas %}
                    {% for r in reservas %}
                    <tr>
                        <td>{{ 100 + loop.index }}</td>
                        <td>Confirmada</td>
                        <td>{{ r[0] }}</td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="3" style="text-align:center;">No hay datos en registro.csv</td>
                    </tr>
                {% endif %}
            </tbody>
        </table>
    </main>
</div>

//LOGICA DEL GRAFICO

<script>
    document.getElementById('csvInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const contenido = event.target.result;
            // Limpiamos espacios y saltos de línea extra
            const lineas = contenido.trim().split('\n').filter(line => line.trim() !== "");
            
            const semanas = ['Semana 1', 'Semana 2', 'Semana 3', 'Semana 4'];
            const datasets = [];
            const colores = [
                'rgba(54, 162, 235, 0.8)',  // Estándar
                'rgba(255, 99, 132, 0.8)',  // Deluxe
                'rgba(75, 192, 192, 0.8)',  // Suite Junior
                'rgba(255, 206, 86, 0.8)'   // Presidencial
            ];

            // Empezamos desde i=1 para saltar la cabecera del CSV
            for (let i = 1; i < lineas.length; i++) {
                const columnas = lineas[i].split(',');
                if (columnas.length >= 5) {
                    datasets.push({
                        label: columnas[0].trim(),
                        data: [
                            parseFloat(columnas[1]) || 0, 
                            parseFloat(columnas[2]) || 0, 
                            parseFloat(columnas[3]) || 0, 
                            parseFloat(columnas[4]) || 0
                        ],
                        backgroundColor: colores[i-1] || 'rgba(150, 150, 150, 0.5)',
                        borderWidth: 1
                    });
                }
            }
            
            if (datasets.length > 0) {
                renderizarGrafico(semanas, datasets);
            } else {
                alert("Formato CSV inválido. Asegúrate de usar comas (,) y tener 5 columnas.");
            }
        };
        reader.readAsText(file);
    });

    let miGrafico;
    function renderizarGrafico(labels, datasets) {
        // CORRECCIÓN: Usar el ID correcto que pusimos en el HTML
        const ctx = document.getElementById('graficoFinanzas').getContext('2d');
        
        if (miGrafico) { 
            miGrafico.destroy(); 
        }

        miGrafico = new Chart(ctx, {
            type: 'bar',
            data: { labels: labels, datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    y: { 
                        beginAtZero: true,
                        ticks: { stepSize: 1 } 
                    } 
                },
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    }
</script>
</body>
</html>
